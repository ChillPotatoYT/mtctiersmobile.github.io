<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MTC TIERS</title>
    <link rel="stylesheet" href="css.css">
</head>
<body>
<div class="sweep-bg"></div>

<header><h1 class="main-title">MTC TIERS</h1></header>

<nav>
    <div class="nav-link active" onclick="switchTab('rankings')">RANKINGS</div>
    <div class="nav-link">HALL OF FAME</div>
    <div class="nav-link">TIER TESTERS</div>
</nav>

<div id="kitBar"></div>
<div id="viewLabel" style="text-align:center; color:var(--gold); margin-bottom:40px; font-size:1.2rem;">OVERALL</div>
<div id="displayList"></div>

<div id="profileModal" class="modal-overlay" onclick="this.style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div id="pRank" style="color:var(--purple); font-size:0.8rem;">RANK #--</div>
        <h2 id="pName" style="font-size: 2.2rem; margin: 10px 0;">Player</h2>
        <div id="pMeta"></div>
        <div id="pPoints" style="color:var(--gold); font-size:1.6rem; margin: 20px 0;">0 PTS</div>
        <div id="pTiers" style="display:flex; flex-wrap:wrap; justify-content:center; border-top:1px solid #222; padding-top:20px;"></div>
    </div>
</div>

<script>
const ASSETS = "assets/";
const DATA_PATH = "data/";
const KIT_MAP = { "Overall": "", "Emerald": "emerald.png", "Emerald KB": "emerald_kb.png", "Emerald OA": "emerald_oa.png", "Dragonhide KB": "dragonhide_kb.png", "Dragonhide KB OA": "kb_oa.png", "Wand": "wand.png", "Diamond": "diamond.png" };

let DATA = {};

async function load() {
    const r = await fetch(`${DATA_PATH}rankings.json?v=${Date.now()}`);
    DATA = await r.json();
    calculateOverall();
    buildKitBar();
    render("Overall");
}

function calculateOverall() {
    let totals = {};
    const PTS = { "HT1":50, "LT1":40, "HT2":30, "LT2":20, "HT3":12, "LT3":8, "HT4":5, "LT4":3, "HT5":2, "LT5":1 };
    for(let k in DATA) if(k!=="Players") for(let t in DATA[k]) {
        const clean = t.replace('R','');
        DATA[k][t].forEach(p => totals[p] = (totals[p]||0) + (PTS[clean]||0));
    }
    DATA["Overall"] = totals;
}

function getTags(name) {
    const p = DATA.Players?.find(x => x.name === name);
    if (!p) return "";
    return `<div class="tag-container">
        <span class="tag tag-${p.region.toLowerCase()}">${p.region}</span>
        <span class="tag tag-${p.device.toLowerCase()}">${p.device}</span>
    </div>`;
}

function render(kit) {
    const out = document.getElementById('displayList');
    out.innerHTML = "";
    document.getElementById('viewLabel').innerText = kit.toUpperCase();

    if(kit === "Overall") {
        const wrap = document.createElement('div'); wrap.style.width="100%"; wrap.style.maxWidth="800px";
        Object.entries(DATA.Overall).sort((a,b)=>b[1]-a[1]).forEach(([name, pts], i) => {
            wrap.innerHTML += `<div class="tier-card clickable" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;" onclick="openProfile('${name}')">
                <div style="display:flex; align-items:center; gap:20px;">
                    <b style="color:var(--purple)">#${i+1}</b>
                    <div style="text-align:left;">${name}${getTags(name)}</div>
                </div>
                <b style="color:var(--gold)">${pts} PTS</b>
            </div>`;
        });
        out.appendChild(wrap);
    } else {
        ["T1","T2","T3","T4","T5"].forEach(lvl => {
            let col = `<div class="tier-column"><div class="tier-label">${lvl}</div>`;
            let has = false;
            for(let t in DATA[kit]) if(t.includes(lvl)) DATA[kit][t].forEach(name => {
                has = true;
                const isR = t.startsWith('R');
                // Updated text: "Retired" instead of "RETIRED"
                const display = isR ? "Retired " + t.substring(1).toUpperCase() : t.toUpperCase();
                col += `<div class="tier-card clickable" onclick="openProfile('${name}')">
                    <div style="font-size:1.1rem;">${name}</div>${getTags(name)}
                    <div style="color:${isR?'var(--grey)':'var(--gold)'}; font-size:0.65rem; margin-top:10px;">${display}</div>
                </div>`;
            });
            if(has) { col += `</div>`; out.innerHTML += col; }
        });
    }
}

function openProfile(name) {
    const sorted = Object.entries(DATA.Overall).sort((a,b)=>b[1]-a[1]);
    document.getElementById('pRank').innerText = "RANK #" + (sorted.findIndex(x => x[0] === name) + 1);
    document.getElementById('pName').innerText = name;
    document.getElementById('pMeta').innerHTML = getTags(name);
    document.getElementById('pPoints').innerText = DATA.Overall[name] + " PTS";
    
    let grid = "";
    for(let k in DATA) if(k!=="Overall" && k!=="Players") for(let t in DATA[k]) if(DATA[k][t].includes(name)) {
        const isR = t.startsWith('R');
        const display = isR ? "Retired " + t.substring(1).toUpperCase() : t.toUpperCase();
        grid += `<div class="p-kit-item">
            <div style="font-size:0.55rem; color:#555; margin-bottom:5px;">${k.toUpperCase()}</div>
            <div class="p-kit-circle" style="border-color:${isR?'var(--grey)':'var(--gold)'}">
                <img src="${ASSETS}${KIT_MAP[k]}" style="width:40px; ${isR?'filter:grayscale(1)':''}">
            </div>
            <div style="color:${isR?'var(--grey)':'var(--gold)'}; font-size:0.75rem;">${display}</div>
        </div>`;
    }
    document.getElementById('pTiers').innerHTML = grid;
    document.getElementById('profileModal').style.display = 'flex';
}

function buildKitBar() {
    const bar = document.getElementById('kitBar');
    Object.keys(KIT_MAP).forEach(k => {
        const btn = document.createElement('button');
        btn.className = `kit-btn ${k==='Overall'?'active':''}`;
        btn.innerHTML = (KIT_MAP[k] ? `<img src="${ASSETS}${KIT_MAP[k]}" style="width:16px; margin-right:8px;"> ` : "") + k.toUpperCase();
        btn.onclick = () => { document.querySelectorAll('.kit-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); render(k); };
        bar.appendChild(btn);
    });
}
load();
</script>
</body>
</html>
