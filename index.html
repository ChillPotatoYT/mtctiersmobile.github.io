<!DOCTYPE html>
<html lang="en" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTC TIERS</title>
<link rel="icon" type="image/png" href="backgroundsword.png">
<style>
@font-face { font-family: 'MultiCraftFont'; src: url('MultiCraftFont.ttf') format('truetype'); }
:root {
--bg: #010102; --purple: #a855f7; --purple-glow: rgba(168, 85, 247, 0.9);
--border: rgba(168, 85, 247, 0.4); --gold: #ffd700; --green: #2ecc71; 
--red: #ff4d4d; --blue: #3498db; --cyan: #00ffff; --yellow: #f1c40f;
--oc-color: #ff00ff; --sa-color: #00ff88; --as-color: #ff8800; --grey: #888;
--mk-color: #00ffff; --mb-color: #ff7f50; --ct-color: #3498db; --tp-color: #ff00aa;
}
body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; overflow-x: hidden; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
.sweep-bg { position: fixed; inset: 0; z-index: -10; background: linear-gradient(110deg, transparent 40%, rgba(168, 85, 247, 0.15) 50%, transparent 60%); background-size: 250% 100%; animation: shineSweep 8s infinite linear; pointer-events: none; }
@keyframes shineSweep { 0% { background-position: 250% 0; } 100% { background-position: -250% 0; } }
header { display: flex; flex-direction: column; align-items: center; width: 100%; padding-top: 20px; position: relative; z-index: 10; }
.title-sword { width: 55px; margin-bottom: 10px; animation: swordPulse 2s infinite ease-in-out; filter: drop-shadow(0 0 15px var(--purple)); }
.main-title { font-family: 'MultiCraftFont'; font-size: 3.2rem; color: #fff; text-shadow: 0 0 10px var(--purple), 0 0 20px var(--purple), 0 0 40px var(--purple-glow); margin: 0; letter-spacing: 2px; }
@keyframes swordPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); filter: drop-shadow(0 0 30px var(--purple-glow)); } }
nav { display: flex; justify-content: center; gap: 30px; padding: 15px; background: rgba(0,0,0,0.9); border-bottom: 2px solid var(--border); width: 100%; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); margin-top: 20px; }
.nav-link { color: #555; font-family: 'MultiCraftFont'; font-size: 0.75rem; cursor: pointer; transition: 0.3s; position: relative; z-index: 110; }
.nav-link.active { color: #fff; text-shadow: 0 0 15px var(--purple); }
.search-wrap { margin: 25px 0; width: 350px; position: relative; z-index: 500; }
#playerSearch { width: 100%; background: #000; border: 2px solid var(--border); border-radius: 8px; color: #fff; padding: 12px; font-family: 'MultiCraftFont'; font-size: 0.75rem; outline: none; transition: 0.3s; text-align: center; }
#playerSearch:focus { border-color: var(--purple); box-shadow: 0 0 20px var(--purple-glow); }
#searchResults { position: absolute; top: 110%; left: 0; right: 0; background: rgba(1, 1, 2, 0.98); border: 2px solid var(--purple); border-radius: 10px; max-height: 300px; overflow-y: auto; display: none; box-shadow: 0 10px 40px rgba(0,0,0,0.9); backdrop-filter: blur(15px); }
.search-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; border-bottom: 1px solid #222; transition: 0.2s; }
.search-item:hover { background: rgba(168, 85, 247, 0.15); }
.search-view-btn { background: var(--purple); color: #fff; font-family: 'MultiCraftFont'; font-size: 0.55rem; padding: 6px 12px; border-radius: 4px; cursor: pointer; border: none; transition: 0.2s; box-shadow: 0 0 10px var(--purple-glow); }
.search-view-btn:hover { background: #fff; color: var(--purple); box-shadow: 0 0 15px #fff; }
#mainContent { width: 100%; display: flex; flex-direction: column; align-items: center; transition: opacity 0.3s ease; }
.fade-out { opacity: 0; }
.tier-container { display: flex; flex-direction: row; justify-content: center; align-items: flex-start; gap: 25px; width: 95%; padding: 20px; flex-wrap: wrap; }
.tier-column { min-width: 280px; flex: 0 1 auto; }
.tier-header { font-family: 'MultiCraftFont'; text-align: center; color: var(--purple); margin-bottom: 15px; font-size: 1rem; border-bottom: 2px solid var(--border); padding-bottom: 8px; text-shadow: 0 0 10px var(--purple); }
.tag { font-family: 'MultiCraftFont'; font-size: 0.5rem; padding: 2px 6px; border-radius: 4px; border: 1px solid #444; margin-right: 5px; text-transform: uppercase; display: inline-block; }
.reg-as { color: var(--as-color); border-color: var(--as-color); box-shadow: 0 0 8px var(--as-color); }
.dev-mk { color: var(--mk-color); border-color: var(--mk-color); box-shadow: 0 0 8px var(--mk-color); }
.tag-device:hover .short-text { display: none; }
.tag-device:hover .full-text { display: inline; }
.tag-device .full-text { display: none; }
.kit-btn { background: #000; border: 1px solid var(--border); padding: 8px 16px; border-radius: 8px; color: #666; cursor: pointer; font-family: 'MultiCraftFont'; font-size: 0.65rem; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
.kit-btn.active.overall { --glow: var(--purple); color: #fff!important; border-color: var(--purple); box-shadow: 0 0 15px var(--purple); }
.tier-card { background: #050508; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; cursor: pointer; transition: 0.3s ease; padding: 15px; position: relative; z-index: 10; }
.tier-card:hover { border-color: var(--purple); box-shadow: 0 0 20px var(--purple-glow); transform: translateY(-3px); }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
.modal-content { background: #010102; border: 2px solid var(--purple); border-radius: 12px; padding: 30px; width: 420px; text-align: center; box-shadow: 0 0 50px var(--purple-glow); animation: modalIn 0.3s ease; }
@keyframes modalIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.p-kit-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 20px; border-top: 1px solid #222; padding-top: 20px; }
.p-kit-item { display: flex; flex-direction: column; align-items: center; position: relative; }
.p-kit-circle { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--gold); display: flex; align-items: center; justify-content: center; background: #050508; transition: 0.3s; }
.p-tier-label { font-family: 'MultiCraftFont'; font-size: 0.55rem; margin-top: 8px; text-transform: uppercase; color: var(--gold); }
</style>
</head>
<body>
<div class="sweep-bg"></div>
<header>
<img src="backgroundsword.png" class="title-sword">
<h1 class="main-title">MTC TIERS</h1>
</header>
<nav>
<div id="nav-rankings" class="nav-link active" onclick="switchTab('rankings')">RANKINGS</div>
<div id="nav-hof" class="nav-link" onclick="switchTab('hof')">HALL OF FAME</div>
<div id="nav-testers" class="nav-link" onclick="switchTab('testers')">TIER TESTERS</div>
</nav>

<div id="mainContent">
<div id="viewLabel" style="font-family:'MultiCraftFont'; font-size:1.2rem; color:var(--gold); margin:20px 0 0 0;">OVERALL</div>
<div class="search-wrap">
    <input type="text" id="playerSearch" placeholder="SEARCH FOR A PLAYER..." autocomplete="off">
    <div id="searchResults"></div>
</div>
<div id="kitBar" style="display:flex; justify-content:center; flex-wrap:wrap; gap:10px; margin-bottom:20px; width: 90%;"></div>
<div id="displayList" style="width:100%; display:flex; flex-direction:column; align-items:center; padding-bottom: 50px;"></div>
</div>

<div id="profileModal" class="modal-overlay" onclick="this.style.display='none'">
<div class="modal-content" onclick="event.stopPropagation()">
<div id="pRank" style="font-family:'MultiCraftFont'; color:var(--purple); font-size:0.7rem;">RANK #--</div>
<h2 id="pName" style="font-family:'MultiCraftFont'; color:#fff; margin:10px 0;">Player</h2>
<div id="pMeta" style="margin-bottom: 15px;"></div>
<div id="pPoints" style="color:var(--gold); font-family:'MultiCraftFont'; font-size:1.4rem; margin-bottom:20px;">0 PTS</div>
<div id="pTiers" class="p-kit-grid"></div>
</div>
</div>

<script>
let DATA = {};
const KIT_MAP = { "Overall": "", "Emerald": "emerald.png", "Emerald KB": "emerald_kb.png", "Emerald OA": "emerald_oa.png", "Dragonhide KB": "dragonhide_kb.png", "Dragonhide KB OA": "kb_oa.png", "Wand": "wand.png", "Diamond": "diamond.png" };

function getTags(name) {
    const p = DATA.Players?.find(x => x.name === name) || {region:"NA", device:"MK"};
    const asStyle = p.region==='AS'?'color:var(--as-color);border-color:var(--as-color);box-shadow:0 0 5px var(--as-color);':'';
    const mkStyle = p.device==='MK'?'color:var(--mk-color);border-color:var(--mk-color);box-shadow:0 0 5px var(--mk-color);':'';
    return `<div class="tag-row" style="margin-top:5px;"><span class="tag reg-${p.region.toLowerCase()}" style="${asStyle}">${p.region}</span><span class="tag tag-device dev-${p.device.toLowerCase()}" style="${mkStyle}"><span class="short-text">${p.device}</span><span class="full-text">${p.device}</span></span></div>`;
}

async function load() {
    const r = await fetch(`https://raw.githubusercontent.com/mtctiers/mtctiers.github.io/refs/heads/main/rankings.json?v=${Date.now()}`);
    DATA = await r.json();
    let totals = {};
    const PTS = { "HT1":50, "LT1":40, "HT2":30, "LT2":20, "HT3":12, "LT3":8, "HT4":5, "LT4":3, "HT5":2, "LT5":1 };
    for(let k in DATA) if(k!=="Players") {
        for(let t in DATA[k]) {
            const base = t.startsWith('R') ? t.substring(1) : t;
            DATA[k][t].forEach(p => totals[p] = (totals[p]||0) + (PTS[base]||0));
        }
    }
    DATA["Overall"] = totals;
    buildKitBar();
    render("Overall");
    initSearch();
}

function buildKitBar() {
    const bar = document.getElementById('kitBar'); bar.innerHTML = "";
    const btn = document.createElement('button');
    btn.className = "kit-btn overall active";
    btn.innerHTML = "OVERALL";
    btn.onclick = () => render("Overall");
    bar.appendChild(btn);
}

function initSearch() {
    const inp = document.getElementById('playerSearch'), res = document.getElementById('searchResults');
    inp.oninput = () => {
        const q = inp.value.toLowerCase();
        res.innerHTML = "";
        if(!q) { res.style.display = "none"; return; }
        const matches = Object.keys(DATA.Overall).filter(n => n.toLowerCase().includes(q));
        if(matches.length > 0) {
            res.style.display = "block";
            matches.forEach(m => {
                const div = document.createElement('div'); div.className = "search-item";
                div.innerHTML = `<span class="name" style="font-family:'MultiCraftFont'; font-size:0.7rem;">${m}</span><button class="search-view-btn" onclick="openProfile('${m}'); res.style.display='none'; inp.value='';">VIEW PROFILE</button>`;
                res.appendChild(div);
            });
        } else { res.style.display = "none"; }
    };
    document.onclick = (e) => { if(e.target !== inp) res.style.display = "none"; };
}

function render(kit) {
    const out = document.getElementById('displayList'); out.innerHTML = "";
    if(kit === "Overall") {
        const sorted = Object.entries(DATA.Overall).sort((a,b)=>b[1]-a[1]);
        sorted.forEach(([name, pts], i) => {
            out.innerHTML += `<div class="tier-card" style="width:700px;" onclick="openProfile('${name}')"><div style="display:flex; justify-content:space-between; align-items:center;"><div style="display:flex; align-items:center;"><b style="color:var(--purple); margin-right:15px; font-family:'MultiCraftFont';">#${i+1}</b><div><span style="font-weight:bold; font-size:1.1rem;">${name}</span>${getTags(name)}</div></div><b style="color:var(--gold); font-size:1.1rem;">${pts} PTS</b></div></div>`;
        });
    }
}

async function switchTab(tab) {
    const mc = document.getElementById('mainContent');
    mc.classList.add('fade-out');
    setTimeout(async () => {
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        document.getElementById('nav-' + tab).classList.add('active');
        document.getElementById('viewLabel').innerText = tab.toUpperCase();
        if(tab === 'rankings') render("Overall");
        else {
            const r = await fetch(`https://raw.githubusercontent.com/mtctiers/mtctiers.github.io/refs/heads/main/${tab}.json?v=${Date.now()}`);
            const items = await r.json();
            const out = document.getElementById('displayList');
            out.innerHTML = "";
            items.forEach(item => {
                out.innerHTML += `<div class="tier-card" style="width:700px;"><b style="color:var(--purple); font-family:'MultiCraftFont';">${item.name}</b><p style="font-size:0.8rem; margin-top:10px;">${item.description || ''}</p></div>`;
            });
        }
        mc.classList.remove('fade-out');
    }, 300);
}

function openProfile(name) {
    const sorted = Object.entries(DATA.Overall).sort((a,b)=>b[1]-a[1]);
    const rank = sorted.findIndex(x => x[0] === name) + 1;
    document.getElementById('pRank').innerText = `RANK #${rank}`;
    document.getElementById('pName').innerText = name;
    document.getElementById('pMeta').innerHTML = getTags(name);
    document.getElementById('pPoints').innerText = (DATA.Overall[name] || 0) + " PTS";
    document.getElementById('profileModal').style.display = 'flex';
}
load();
</script>
</body>
</html>
