<!DOCTYPE html>
<html lang="en" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTC TIERS</title>

<meta property="og:title" content="MTC TIERS" />
<meta property="og:description" content="Tiertesting and Rankings for MultiCraft" />
<meta property="og:url" content="https://mtctiers.github.io/" />
<meta property="og:image" content="https://mtctiers.github.io/backgroundsword.png" />
<meta property="og:type" content="website" />
<meta name="theme-color" content="#a855f7">

<link rel="icon" type="image/png" href="backgroundsword.png">
<style>
@font-face { font-family: 'MultiCraftFont'; src: url('MultiCraftFont.ttf') format('truetype'); }
:root {
--bg: #010102; --purple: #a855f7; --purple-glow: rgba(168, 85, 247, 0.9);
--border: rgba(168, 85, 247, 0.4); --gold: #ffd700; --green: #2ecc71; 
--red: #ff4d4d; --blue: #3498db; --cyan: #00ffff; --yellow: #f1c40f;
--oc-color: #ff00ff; --sa-color: #00ff88; --as-color: #ff8800; --grey: #888;
--mk-color: #00ffff; --mb-color: #ff7f50; --ct-color: #3498db; --tp-color: #ff00aa;
}
body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; overflow-x: hidden; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
.sweep-bg { position: fixed; inset: 0; z-index: -10; background: linear-gradient(110deg, transparent 40%, rgba(168, 85, 247, 0.15) 50%, transparent 60%); background-size: 250% 100%; animation: shineSweep 8s infinite linear; pointer-events: none; }
@keyframes shineSweep { 0% { background-position: 250% 0; } 100% { background-position: -250% 0; } }

header { display: flex; flex-direction: column; align-items: center; width: 100%; padding-top: 20px; position: relative; z-index: 10; }
.title-sword { width: 55px; margin-bottom: 10px; animation: swordPulse 2s infinite ease-in-out; filter: drop-shadow(0 0 15px var(--purple)); }
.main-title { font-family: 'MultiCraftFont'; font-size: 3.2rem; color: #fff; text-shadow: 0 0 10px var(--purple), 0 0 20px var(--purple), 0 0 40px var(--purple-glow); margin: 0; letter-spacing: 2px; }
@keyframes swordPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); filter: drop-shadow(0 0 30px var(--purple-glow)); } }

nav { display: flex; align-items: center; justify-content: center; padding: 15px 40px; background: rgba(0,0,0,0.9); border-bottom: 2px solid var(--border); width: 100%; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); margin-top: 20px; box-sizing: border-box; }
.nav-links-container { display: flex; gap: 40px; position: absolute; left: 50%; transform: translateX(-50%); }
.nav-link { color: #555; font-family: 'MultiCraftFont'; font-size: 0.75rem; cursor: pointer; transition: 0.3s; }
.nav-link.active { color: #fff; text-shadow: 0 0 15px var(--purple); }

.search-wrap { margin-left: auto; width: 220px; position: relative; }
#playerSearch { width: 100%; background: #000; border: 1px solid var(--border); border-radius: 5px; color: #fff; padding: 8px 12px; font-family: 'MultiCraftFont'; font-size: 0.6rem; outline: none; }
#searchResults { position: absolute; top: 110%; right: 0; width: 250px; background: #050508; border: 1px solid var(--purple); border-radius: 5px; max-height: 300px; overflow-y: auto; display: none; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
.search-item { padding: 10px; border-bottom: 1px solid #222; cursor: pointer; display: flex; justify-content: space-between; font-family: 'MultiCraftFont'; font-size: 0.55rem; }
.search-item:hover { background: #111; }

.tier-card { background: #050508; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; cursor: pointer; transition: 0.4s; padding: 15px; position: relative; z-index: 10; width: 700px; }
.tier-card:hover { border-color: var(--purple); box-shadow: 0 0 20px var(--purple-glow); transform: translateY(-5px); }

.global-info-btn { position: fixed; bottom: 25px; right: 25px; width: 45px; height: 45px; border-radius: 50%; background: #000; border: 2px solid var(--purple); color: var(--purple); display: flex; align-items: center; justify-content: center; font-family: 'MultiCraftFont'; font-size: 1.2rem; cursor: pointer; z-index: 5000; box-shadow: 0 0 15px var(--purple-glow); transition: 0.3s; }
.global-info-btn:hover { transform: scale(1.1); background: var(--purple); color: #fff; }

/* REGION & DEVICE COLORS */
.tag { font-family: 'MultiCraftFont'; font-size: 0.5rem; padding: 2px 6px; border-radius: 4px; border: 1px solid #444; margin-right: 5px; text-transform: uppercase; display: inline-block; margin-top: 5px; }
.reg-na { color: var(--blue); border-color: var(--blue); }
.reg-eu { color: var(--red); border-color: var(--red); }
.reg-sa { color: var(--sa-color); border-color: var(--sa-color); }
.reg-oc { color: var(--oc-color); border-color: var(--oc-color); }
.reg-as { color: var(--as-color); border-color: var(--as-color); }
.dev-mk { color: var(--mk-color); border-color: var(--mk-color); }
.dev-tp { color: var(--tp-color); border-color: var(--tp-color); }
.dev-ct { color: var(--ct-color); border-color: var(--ct-color); }
.dev-mb { color: var(--mb-color); border-color: var(--mb-color); }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 6000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
.modal-content { background: #010102; border: 2px solid var(--purple); border-radius: 12px; padding: 30px; width: 440px; text-align: center; box-shadow: 0 0 50px var(--purple-glow); position: relative; }

.p-kit-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 20px; border-top: 1px solid #222; padding-top: 20px; }
.p-kit-item { display: flex; flex-direction: column; align-items: center; position: relative; }
.p-kit-circle { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--gold); display: flex; align-items: center; justify-content: center; background: #050508; transition: 0.2s; z-index: 5; }
.p-kit-circle img { width: 28px; height: 28px; object-fit: contain; }

/* HOVER TOOLTIP FIX */
.p-kit-hover { position: absolute; bottom: 115%; left: 50%; transform: translateX(-50%); background: #000; border: 1px solid var(--purple); padding: 8px; border-radius: 4px; opacity: 0; transition: 0.2s; white-space: nowrap; pointer-events: none; z-index: 100; font-family: 'MultiCraftFont'; font-size: 0.6rem; }
.p-kit-item:hover .p-kit-hover { opacity: 1; bottom: 125%; }
.p-kit-item:hover .p-kit-circle { border-color: #fff; transform: scale(1.1); }
.p-tier-label { font-family: 'MultiCraftFont'; font-size: 0.55rem; margin-top: 8px; color: var(--gold); text-transform: uppercase; }

.info-line { font-family: 'MultiCraftFont'; font-size: 0.7rem; color: #888; margin: 8px 0; text-transform: uppercase; }
.pts-list { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 15px; border-top: 1px solid #222; padding-top: 15px; }
.pts-item { font-family: 'MultiCraftFont'; font-size: 0.55rem; color: #fff; text-transform: uppercase; }

.kit-btn { background: #000; border: 1px solid var(--border); padding: 8px 16px; border-radius: 8px; color: #666; cursor: pointer; font-family: 'MultiCraftFont'; font-size: 0.65rem; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
.kit-btn.active { color: #fff; border-color: var(--purple); box-shadow: 0 0 10px var(--purple-glow); }
</style>
</head>
<body>
<div class="sweep-bg"></div>
<header>
<img src="backgroundsword.png" class="title-sword">
<h1 class="main-title">MTC TIERS</h1>
</header>
<nav>
<div class="nav-links-container">
    <div id="nav-rankings" class="nav-link active" onclick="switchTab('rankings')">RANKINGS</div>
    <div id="nav-hof" class="nav-link" onclick="switchTab('hof')">HALL OF FAME</div>
    <div id="nav-testers" class="nav-link" onclick="switchTab('testers')">TIER TESTERS</div>
</div>
<div class="search-wrap">
    <input type="text" id="playerSearch" placeholder="SEARCH PLAYER..." oninput="handleSearch()">
    <div id="searchResults"></div>
</div>
</nav>

<div id="viewLabel" style="font-family:'MultiCraftFont'; font-size:1.2rem; color:var(--gold); margin:30px 0;">OVERALL</div>
<div id="kitBar" style="display:flex; justify-content:center; flex-wrap:wrap; gap:10px; margin-bottom:20px; width: 90%;"></div>
<div id="displayList" style="width:100%; display:flex; flex-direction:column; align-items:center; padding-bottom: 50px;"></div>

<div class="global-info-btn" onclick="document.getElementById('siteInfoModal').style.display='flex'">i</div>

<div id="siteInfoModal" class="modal-overlay" onclick="this.style.display='none'">
<div class="modal-content" onclick="event.stopPropagation()">
    <h2 style="font-family:'MultiCraftFont'; color:var(--purple); margin-bottom:15px;">INFO</h2>
    <div class="info-line">SERVER CODE: <span style="color:var(--red)">UNRELEASED</span></div>
    <div class="info-line">DISCORD: <span style="color:var(--red)">UNRELEASED</span></div>
    <div class="pts-list">
        <div class="pts-item">LT5 = 1 PT</div><div class="pts-item">HT5 = 2 PTS</div>
        <div class="pts-item">LT4 = 3 PTS</div><div class="pts-item">HT4 = 5 PTS</div>
        <div class="pts-item">LT3 = 8 PTS</div><div class="pts-item">HT3 = 12 PTS</div>
        <div class="pts-item">LT2 = 20 PTS</div><div class="pts-item">HT2 = 30 PTS</div>
        <div class="pts-item">LT1 = 40 PTS</div><div class="pts-item">HT1 = 50 PTS</div>
    </div>
</div>
</div>

<div id="profileModal" class="modal-overlay" onclick="this.style.display='none'">
<div class="modal-content" onclick="event.stopPropagation()">
<div id="pRank" style="font-family:'MultiCraftFont'; color:var(--purple); font-size:0.7rem;">RANK #--</div>
<h2 id="pName" style="font-family:'MultiCraftFont'; color:#fff; margin:10px 0;">Player</h2>
<div id="pMeta" style="margin-bottom: 15px;"></div>
<div id="pPoints" style="color:var(--gold); font-family:'MultiCraftFont'; font-size:1.4rem; margin-bottom:20px;">0 PTS</div>
<div id="pTiers" class="p-kit-grid"></div>
</div>
</div>

<script>
let DATA = {};
const KIT_MAP = { "Overall": "", "Emerald": "emerald.png", "Emerald KB": "emerald_kb.png", "Emerald OA": "emerald_oa.png", "Dragonhide KB": "dragonhide_kb.png", "Dragonhide KB OA": "kb_oa.png", "Wand": "wand.png", "Diamond": "diamond.png" };

function getTags(name) {
    const p = DATA.Players?.find(x => x.name === name) || {region:"NA", device:"MK"};
    return `<div class="tag-row"><span class="tag reg-${p.region.toLowerCase()}">${p.region}</span><span class="tag dev-${p.device.toLowerCase()}">${p.device}</span></div>`;
}

async function load() {
    const r = await fetch(`https://raw.githubusercontent.com/mtctiers/mtctiers.github.io/refs/heads/main/rankings.json?v=${Date.now()}`);
    DATA = await r.json();
    let totals = {};
    const PTS = { "HT1":50, "LT1":40, "HT2":30, "LT2":20, "HT3":12, "LT3":8, "HT4":5, "LT4":3, "HT5":2, "LT5":1 };
    for(let k in DATA) if(k!=="Players") {
        for(let t in DATA[k]) {
            const base = t.startsWith('R') ? t.substring(1) : t;
            DATA[k][t].forEach(p => totals[p] = (totals[p]||0) + (PTS[base]||0));
        }
    }
    DATA["Overall"] = totals;
    buildKitBar();
    render("Overall");
}

function buildKitBar() {
    const bar = document.getElementById('kitBar'); bar.innerHTML = "";
    Object.keys(KIT_MAP).forEach(k => {
        const btn = document.createElement('button');
        btn.className = `kit-btn ${k==='Overall'?'active':''}`;
        btn.innerHTML = (KIT_MAP[k] ? `<img src="${KIT_MAP[k]}" width="18"> ` : "") + k.toUpperCase();
        btn.onclick = () => {
            document.querySelectorAll('.kit-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('viewLabel').innerText = k.toUpperCase();
            render(k);
        };
        bar.appendChild(btn);
    });
}

function handleSearch() {
    const q = document.getElementById('playerSearch').value.toLowerCase();
    const res = document.getElementById('searchResults');
    res.innerHTML = "";
    if(!q) { res.style.display = "none"; return; }
    const matches = Object.keys(DATA.Overall).filter(n => n.toLowerCase().includes(q));
    if(matches.length > 0) {
        res.style.display = "block";
        matches.forEach(m => {
            const div = document.createElement('div');
            div.className = "search-item";
            div.innerHTML = `<span>${m}</span><b style="color:var(--purple)">VIEW PROFILE</b>`;
            div.onclick = () => { openProfile(m); res.style.display="none"; document.getElementById('playerSearch').value=""; };
            res.appendChild(div);
        });
    } else res.style.display = "none";
}

function render(kit) {
    const out = document.getElementById('displayList'); out.innerHTML = "";
    if(kit === "Overall") {
        const sorted = Object.entries(DATA.Overall).sort((a,b)=>b[1]-a[1]);
        sorted.forEach(([name, pts], i) => {
            out.innerHTML += `<div class="tier-card" onclick="openProfile('${name}')"><div style="display:flex; justify-content:space-between; align-items:center;"><div style="display:flex; align-items:center;"><b style="color:var(--purple); margin-right:15px; font-family:'MultiCraftFont';">#${i+1}</b><div><span style="font-weight:bold; font-size:1.1rem;">${name}</span>${getTags(name)}</div></div><b style="color:var(--gold); font-size:1.1rem;">${pts} PTS</b></div></div>`;
        });
    } else {
        for(let t in DATA[kit]) {
            DATA[kit][t].forEach(name => {
                const isR = t.startsWith('R');
                out.innerHTML += `<div class="tier-card" onclick="openProfile('${name}')"><div style="display:flex; justify-content:space-between; align-items:center;"><div style="display:flex; align-items:center;"><b style="color:var(--purple); margin-right:15px; font-family:'MultiCraftFont';">${isR?'RET':t}</b><div><span style="font-weight:bold; font-size:1.1rem;">${name}</span>${getTags(name)}</div></div><b style="color:var(--gold); font-size:0.8rem;">${isR?'RETIRED':t}</b></div></div>`;
            });
        }
    }
}

async function switchTab(tab) {
    document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
    document.getElementById('nav-' + tab).classList.add('active');
    const out = document.getElementById('displayList'), kb = document.getElementById('kitBar'), lb = document.getElementById('viewLabel');
    out.innerHTML = "";
    if(tab === 'rankings') {
        kb.style.display = "flex"; lb.innerText = "OVERALL"; render("Overall");
    } else {
        kb.style.display = "none"; lb.innerText = tab.toUpperCase().replace('-',' ');
        const r = await fetch(`https://raw.githubusercontent.com/mtctiers/mtctiers.github.io/refs/heads/main/${tab}.json?v=${Date.now()}`);
        const list = await r.json();
        list.forEach(item => {
            out.innerHTML += `<div class="tier-card"><b style="color:var(--purple); font-family:'MultiCraftFont';">${item.name}</b><p style="color:#bbb; font-size:0.8rem; margin-top:10px;">${item.description || ''}</p></div>`;
        });
    }
}

function openProfile(name) {
    const sorted = Object.entries(DATA.Overall).sort((a,b)=>b[1]-a[1]);
    const rank = sorted.findIndex(x => x[0] === name) + 1;
    document.getElementById('pRank').innerText = `RANK #${rank}`;
    document.getElementById('pName').innerText = name;
    document.getElementById('pMeta').innerHTML = getTags(name);
    document.getElementById('pPoints').innerText = (DATA.Overall[name] || 0) + " PTS";
    let grid = "";
    for(let k in DATA) if(k!=="Overall" && k!=="Players") {
        for(let t in DATA[k]) if(DATA[k][t].includes(name)) {
            const isR = t.startsWith('R'); const display = isR ? `Retired ${t.slice(1)}` : t;
            grid += `<div class="p-kit-item"><div class="p-kit-hover"><b>${k}</b><br>${display}</div><div class="p-kit-circle">${KIT_MAP[k]?`<img src="${KIT_MAP[k]}">`:''}</div><div class="p-tier-label">${display}</div></div>`;
        }
    }
    document.getElementById('pTiers').innerHTML = grid || "<p style='color:#555;'>No Rankings Found</p>";
    document.getElementById('profileModal').style.display = 'flex';
}

load();
</script>
</body>
</html>
