<!DOCTYPE html>
<html lang="en" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTC TIERS</title>
<link rel="icon" type="image/png" href="backgroundsword.png">
<style>
@font-face { font-family: 'MultiCraftFont'; src: url('MultiCraftFont.ttf') format('truetype'); }
:root {
    /* Background updated to match dark navy theme */
    --bg: #0d0b1e; 
    --purple: #a855f7; --purple-glow: rgba(168, 85, 247, 0.9);
    --border: rgba(168, 85, 247, 0.4); --gold: #ffd700; --gold-glow: rgba(255, 215, 0, 0.6); --grey: #888;
    --na-color: #3498db; --eu-color: #ff4d4d; --sa-color: #00ff88; --oc-color: #ff00ff; --as-color: #ff8800;
    --af-color: #00d4ff;
}
body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; overflow-x: hidden; display: flex; flex-direction: column; align-items: center; min-height: 100vh; font-size: 0.9rem; }

/* WHITE SWEEP ANIMATION */
.sweep-bg { 
    position: fixed; inset: 0; z-index: -10; 
    background: linear-gradient(110deg, transparent 40%, rgba(255, 255, 255, 0.08) 50%, transparent 60%); 
    background-size: 250% 100%; animation: shineSweep 10s infinite linear; pointer-events: none; 
}
@keyframes shineSweep { 0% { background-position: 250% 0; } 100% { background-position: -250% 0; } }

header { display: flex; flex-direction: column; align-items: center; width: 100%; padding-top: 150px; position: relative; z-index: 10; }
.title-sword { width: 45px; margin-bottom: 10px; animation: swordGlow 2s infinite ease-in-out; filter: drop-shadow(0 0 5px var(--purple)); }
.main-title { font-family: 'MultiCraftFont'; font-size: 2.8rem; color: #fff; text-shadow: 0 0 10px var(--purple); margin: 0; }

nav { display: flex; justify-content: center; align-items: center; padding: 10px 40px; background: rgba(0,0,0,0.95); border-bottom: 2px solid var(--border); width: 100%; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); margin-top: 65px; box-sizing: border-box; }
.nav-center { display: flex; gap: 25px; position: absolute; left: 50%; transform: translateX(-50%); }
.nav-link { color: #555; font-family: 'MultiCraftFont'; font-size: 0.75rem; cursor: pointer; transition: 0.3s; }
.nav-link.active { color: #fff; text-shadow: 0 0 15px var(--purple); }

#displayList { width: 100%; display: flex; flex-direction: column; align-items: center; padding: 20px 0 100px 0; }
.tier-card { background: rgba(5, 5, 8, 0.6); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; transition: 0.3s; padding: 15px; width: 650px; position: relative; }
.clickable:hover { border-color: var(--purple); box-shadow: 0 0 12px var(--purple-glow); transform: translateY(-2px); }

/* TAGS */
.tag { font-family: 'MultiCraftFont'; font-size: 0.55rem; padding: 2px 6px; border-radius: 4px; border: 1px solid #444; display: inline-block; margin-right: 5px; }

.p-kit-item { position: relative; display: flex; flex-direction: column; align-items: center; width: 85px; }
.p-kit-circle { width: 52px; height: 52px; border-radius: 50%; border: 2px solid var(--gold); display: flex; align-items: center; justify-content: center; background: #000; transition: 0.3s; }
.p-kit-circle img { width: 28px; height: 28px; }
.kit-popup { position: absolute; bottom: 105%; left: 50%; transform: translateX(-50%); background: #000; border: 1px solid var(--purple); border-radius: 6px; padding: 8px; opacity: 0; visibility: hidden; transition: 0.2s; z-index: 3000; font-family: 'MultiCraftFont'; font-size: 0.55rem; text-align: center; box-shadow: 0 0 15px var(--purple-glow); width: 100px; }
.p-kit-item:hover .kit-popup { opacity: 1; visibility: visible; }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
.modal-content { background: #010102; border: 2px solid var(--purple); border-radius: 12px; padding: 30px; width: 440px; text-align: center; }

#kitBar { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
.kit-btn { background: #000; border: 1px solid var(--border); padding: 8px 16px; border-radius: 6px; color: #666; cursor: pointer; font-family: 'MultiCraftFont'; font-size: 0.65rem; }
.kit-btn.active { color: #fff; border-color: var(--purple); box-shadow: 0 0 12px var(--purple); }
</style>
</head>
<body>
<div class="sweep-bg"></div>
<header><img src="backgroundsword.png" class="title-sword" alt="Logo"><h1 class="main-title">MTC TIERS</h1></header>

<nav>
    <div class="nav-center">
        <div id="nav-rankings" class="nav-link active" onclick="switchTab('rankings')">RANKINGS</div>
        <div id="nav-hof" class="nav-link" onclick="switchTab('hof')">HALL OF FAME</div>
        <div id="nav-testers" class="nav-link" onclick="switchTab('testers')">TIER TESTERS</div>
    </div>
</nav>

<div id="viewLabel" style="font-family:'MultiCraftFont'; font-size:1.2rem; color:var(--gold); margin:25px 0; text-align:center;">OVERALL</div>
<div id="kitBar"></div>
<div id="displayList"></div>

<div id="profileModal" class="modal-overlay" onclick="this.style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div id="pRank" style="font-family:'MultiCraftFont'; color:var(--purple); font-size:0.7rem;">RANK #--</div>
        <h2 id="pName" style="font-family:'MultiCraftFont'; color:#fff; margin:10px 0; font-size: 1.8rem;">Player</h2>
        <div id="pPoints" style="color:var(--gold); font-family:'MultiCraftFont'; font-size:1.4rem; margin-bottom:20px;">0 PTS</div>
        <div id="pTiers" style="display:flex; flex-wrap:wrap; justify-content:center; gap:18px; border-top:1px solid #222; padding-top:20px;"></div>
    </div>
</div>

<script>
let DATA = {};
let CURRENT_TAB = 'rankings';
let CURRENT_KIT = 'Overall';

const KIT_MAP = { 
    "Overall": "", 
    "Emerald": "emerald.png", 
    "Emerald KB": "emerald_kb.png", 
    "Emerald OA": "emerald_oa.png", 
    "Dragonhide KB": "dragonhide_kb.png", 
    "Dragonhide KB OA": "kb_oa.png", 
    "Wand": "wand.png", 
    "Diamond": "diamond.png" 
};

async function load() {
    const r = await fetch(`https://raw.githubusercontent.com/mtctiers/mtctiers.github.io/refs/heads/main/rankings.json?v=${Date.now()}`);
    DATA = await r.json();
    let totals = {};
    const PTS = { "HT1":50, "LT1":40, "HT2":30, "LT2":20, "HT3":12, "LT3":8, "HT4":5, "LT4":3, "HT5":2, "LT5":1 };
    for(let k in DATA) if(k!=="Overall" && k!=="Players") for(let t in DATA[k]) DATA[k][t].forEach(p => totals[p] = (totals[p]||0) + (PTS[t.replace('R','')]||0));
    DATA["Overall"] = totals;
    buildKitBar();
    render("Overall");
}

function buildKitBar() {
    const bar = document.getElementById('kitBar'); bar.innerHTML = "";
    Object.keys(KIT_MAP).forEach(k => {
        const btn = document.createElement('button');
        btn.className = `kit-btn ${k==='Overall'?'active':''}`;
        btn.innerHTML = (KIT_MAP[k] ? `<img src="${KIT_MAP[k]}" style="width:14px; margin-right:5px;"> ` : "") + k.toUpperCase();
        btn.onclick = () => { CURRENT_KIT = k; render(k); document.querySelectorAll('.kit-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); };
        bar.appendChild(btn);
    });
}

function render(kit) {
    document.getElementById('viewLabel').innerText = kit.toUpperCase();
    const out = document.getElementById('displayList'); out.innerHTML = "";
    if(kit === "Overall") {
        Object.entries(DATA.Overall).sort((a,b)=>b[1]-a[1]).forEach(([name, pts], i) => {
            out.innerHTML += `<div class="tier-card clickable" onclick="openProfile('${name}')"><b>#${i+1} ${name}</b> <span style="float:right; color:var(--gold);">${pts} PTS</span></div>`;
        });
    } else {
        ["HT1","LT1","HT2","LT2","HT3","LT3"].forEach(lvl => {
            if(DATA[kit][lvl]) DATA[kit][lvl].forEach(name => {
                out.innerHTML += `<div class="tier-card clickable" onclick="openProfile('${name}')"><b>${name}</b> <span style="float:right; color:var(--gold);">${lvl}</span></div>`;
            });
        });
    }
}

function openProfile(name) {
    const sorted = Object.entries(DATA.Overall).sort((a,b)=>b[1]-a[1]);
    const rankIdx = sorted.findIndex(x => x[0] === name);
    document.getElementById('pRank').innerText = "RANK #" + (rankIdx + 1);
    document.getElementById('pName').innerText = name;
    document.getElementById('pPoints').innerText = (DATA.Overall[name] || 0) + " PTS";
    
    let grid = "";
    for(let k in DATA) {
        if(k === "Overall" || k === "Players") continue;
        for(let t in DATA[k]) {
            if(DATA[k][t].includes(name)) {
                const isR = t.startsWith('R');
                const displayLabel = isR ? 'Retired ' + t.substring(1) : t;
                const color = isR ? 'var(--grey)' : 'var(--gold)';
                grid += `<div class="p-kit-item">
                    <div class="kit-popup" style="border-color:${color}"><span style="color:${color}">${displayLabel}</span><br><span style="color:#888">${k}</span></div>
                    <div class="p-kit-circle" style="border-color:${color}">${KIT_MAP[k]?`<img src="${KIT_MAP[k]}">`:''}</div>
                    <div style="font-size:0.55rem; color:${color}; font-weight:bold; margin-top:5px;">${displayLabel}</div>
                </div>`;
            }
        }
    }
    document.getElementById('pTiers').innerHTML = grid;
    document.getElementById('profileModal').style.display = 'flex';
}

load();
</script>
</body>
</html>
